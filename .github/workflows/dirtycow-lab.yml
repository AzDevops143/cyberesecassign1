name: Dirty COW Lab CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}

    - name: Build Docker Container
      run: |
        echo "=== Building the Dirty COW Lab Docker Container ==="
        docker build -t dirtycow-lab .

    - name: Run Lab Demonstration
      run: |
        echo "=== Running the Dirty COW Lab Demonstration ==="
        docker run --rm dirtycow-lab
