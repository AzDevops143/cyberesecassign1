name: Secure Build, Sign, and Run Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-sign:
    name: Build & Sign Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set lowercase repository name
      run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.5.0

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Scan Locally
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: ${{ env.IMAGE_TAG }}:temp-scan

    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_TAG }}:temp-scan
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Push to GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_TAG }}:latest
          ${{ env.IMAGE_TAG }}:${{ github.sha }}

    - name: Sign Image
      env:
        TAGS: ${{ env.IMAGE_TAG }}:${{ github.sha }}
      run: cosign sign --yes "${TAGS}"

  test-dirty-cow:
    name: Stage 1 - Dirty COW
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run Container Escape (CVE-2016-5195)
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-1

  test-dirty-pipe:
    name: Stage 1B - Dirty Pipe
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run Modern Kernel Escape (CVE-2022-0847)
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-1b

  test-copy-fail:
    name: Stage 1C - Copy Fail
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run Crypto Kernel Escape (CVE-2026-31431)
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-1c

  test-dirty-frag:
    name: Stage 1D - Dirty Frag
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run IPv6 Frag Escape (CVE-2026-43284)
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-1d

  test-fragnesia:
    name: Stage 1E - Fragnesia
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run ESP-in-TCP Escape (CVE-2026-46300)
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-1e

  test-mitre-matrix:
    name: Stage 5 - MITRE Matrix
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run MITRE ATT&CK and D3FEND Matrix
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-5

  test-capabilities:
    name: Stage 2 - Capabilities
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run Process Injection Test
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-2

  test-socket-api:
    name: Stage 3 - Daemon API
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run API Hijack Test
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-3

  test-filesystem:
    name: Stage 4 - Persistent Mounts
    needs: build-and-sign
    runs-on: ubuntu-latest
    steps:
    - name: Run Host Filesystem Pivot Test
      run: |
        IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}
        docker run --rm ${IMAGE_TAG}:latest /bin/bash run_demo.sh --stage-4
